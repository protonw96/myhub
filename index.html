<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>S.Hub v7</title>
    <style>
        :root { --bg: #030303; --card: #101010; --accent: #00ff95; --text: #f0f0f0; --border: #222; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 0; }
        #lock { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pin { background: #1a1a1a; border: 2px solid #333; color: var(--accent); font-size: 32px; text-align: center; width: 240px; padding: 15px; border-radius: 18px; letter-spacing: 5px; outline: none; margin-bottom: 20px; }
        .btn-l { width: 240px; background: var(--accent); color: black; border: none; padding: 18px; border-radius: 18px; font-weight: bold; font-size: 18px; cursor: pointer; }
        #hub-wrapper { display: none; padding: 20px; padding-bottom: 50px; }
        .base-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-add { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 8px 15px; border-radius: 10px; font-weight: bold; }
        #add-form { display: none; background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid var(--border); margin-bottom: 20px; }
        input, textarea { width: 100%; background: #1a1a1a; border: 1px solid #333; color: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-s { width: 100%; background: var(--accent); color: black; border: none; padding: 18px; border-radius: 15px; font-weight: bold; font-size: 18px; }
        .card { background: var(--card); border-radius: 22px; padding: 18px; margin-bottom: 15px; border: 1px solid var(--border); position: relative; }
        .card-h { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .card-t { font-weight: bold; font-size: 19px; color: var(--accent); user-select: text !important; -webkit-user-select: text !important; margin: 0; flex: 1; }
        .card-d { display: none; color: #ccc; font-size: 15px; line-height: 1.6; margin-top: 15px; white-space: pre-wrap; user-select: text !important; -webkit-user-select: text !important; border-top: 1px solid #222; padding-top: 10px; }
        .card-d.open { display: block; }
        .btn-del { background: none; border: none; color: #ff4444; font-size: 12px; position: absolute; bottom: 15px; right: 18px; }
    </style>
</head>
<body>
    <div id="lock">
        <h1 style="color: var(--accent); font-size: 26px;">SECURE ACCESS</h1>
        <input type="password" id="pin" class="pin" inputmode="numeric" maxlength="8" placeholder="****">
        <button class="btn-l" onclick="check()">ВОЙТИ</button>
        <p id="err" style="color: #ff4444; margin-top: 15px; display: none;">Неверный код!</p>
    </div>
    <div id="hub-wrapper">
        <div class="base-header">
            <h1 style="margin:0;">S.Hub</h1>
            <button class="btn-add" id="toggle-add-btn" onclick="toggleForm()">+ Добавить</button>
        </div>
        <div id="add-form">
            <input type="text" id="nt" placeholder="Название">
            <textarea id="nd" rows="6" placeholder="Текст заметки..."></textarea>
            <button class="btn-s" onclick="add()">СОХРАНИТЬ</button>
        </div>
        <div id="list"></div>
    </div>
<script>
    const P = "12051205";
    function check() {
        if(document.getElementById('pin').value === P) {
            document.getElementById('lock').style.display = 'none';
            document.getElementById('hub-wrapper').style.display = 'block';
            draw();
        } else {
            document.getElementById('err').style.display = 'block';
            document.getElementById('pin').value = '';
        }
    }
    let db = JSON.parse(localStorage.getItem('shub_v7')) || [];
    function toggleForm() {
        const f = document.getElementById('add-form');
        f.style.display = f.style.display === 'block' ? 'none' : 'block';
    }
    function add() {
        const t = document.getElementById('nt').value;
        const d = document.getElementById('nd').value;
        if(t && d) {
            db.unshift({t, d});
            localStorage.setItem('shub_v7', JSON.stringify(db));
            location.reload();
        }
    }
    function toggleDesc(id) {
        document.getElementById('d-' + id).classList.toggle('open');
    }
    function draw() {
        const list = document.getElementById('list');
        list.innerHTML = db.map((n, i) => `
            <div class="card">
                <div class="card-h" onclick="toggleDesc(${i})">
                    <h2 class="card-t">${n.t}</h2>
                    <span style="color:#555">👁️</span>
                </div>
                <div class="card-d" id="d-${i}">${n.d}</div>
                <button onclick="del(${i})" class="btn-del">✕</button>
            </div>
        `).join('');
    }
    function del(i) { if(confirm("Удалить?")) { db.splice(i,1); localStorage.setItem('shub_v7', JSON.stringify(db)); draw(); } }
</script>
</body>
</html>
