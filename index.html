<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.Hub Premium</title>
    <style>
        :root { --bg: #0a0a0b; --card: #161618; --accent: #00ffa3; --text: #ffffff; --dim: #8e8e93; }
        
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* ВХОД */
        #lock { position: fixed; inset: 0; background: radial-gradient(circle at center, #1a1a1c 0%, #0a0a0b 100%); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.4s; }
        .pin-input { background: rgba(255,255,255,0.05); border: 1px solid #333; color: var(--accent); font-size: 32px; text-align: center; width: 220px; padding: 18px; border-radius: 24px; margin-bottom: 25px; outline: none; letter-spacing: 8px; backdrop-filter: blur(10px); }
        
        /* ШАПКА */
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(10,10,11,0.8); backdrop-filter: blur(20px); z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-size: 24px; font-weight: 800; background: linear-gradient(90deg, #00ffa3, #00d1ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* КОНТЕНТ */
        #app { display: none; padding: 15px; padding-bottom: 100px; }
        
        .search-wrap { margin-bottom: 20px; position: relative; }
        .search-wrap input { width: 100%; background: var(--card); border: 1px solid #2c2c2e; color: white; padding: 15px 15px 15px 45px; border-radius: 18px; box-sizing: border-box; font-size: 16px; outline: none; }
        .search-icon { position: absolute; left: 15px; top: 15px; color: var(--dim); }

        /* КАРТОЧКИ */
        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.03); box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: transform 0.2s; }
        .card:active { transform: scale(0.98); }
        .card-h { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .card-t { font-weight: 700; font-size: 18px; color: var(--text); flex: 1; }
        .card-arrow { color: var(--dim); transition: 0.3s; }
        
        .card-d { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out, margin 0.3s; color: #a1a1a6; line-height: 1.6; font-size: 15px; white-space: pre-wrap; user-select: text !important; -webkit-user-select: text !important; }
        .card-d.open { max-height: 2000px; margin-top: 15px; border-top: 1px solid #2c2c2e; padding-top: 15px; }

        .footer-card { display: flex; justify-content: space-between; margin-top: 15px; font-size: 11px; color: var(--dim); font-weight: 500; }
        .del-btn { color: #ff3b30; padding: 5px; }

        /* ФОРМА ДОБАВЛЕНИЯ */
        #form-add { position: fixed; bottom: 0; left: 0; right: 0; background: #1c1c1e; border-radius: 30px 30px 0 0; padding: 25px; transform: translateY(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        #form-add.active { transform: translateY(0); }
        #form-add textarea { width: 100%; background: #2c2c2e; border: none; color: white; padding: 15px; border-radius: 18px; font-size: 16px; margin-bottom: 10px; resize: none; box-sizing: border-box; outline: none; }
        #form-add input { width: 100%; background: #2c2c2e; border: none; color: white; padding: 15px; border-radius: 18px; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; outline: none; }

        .btn-main { background: var(--accent); color: black; border: none; padding: 18px; border-radius: 20px; font-weight: 700; width: 100%; font-size: 16px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,255,163,0.3); }

        /* ПЛАВАЮЩАЯ КНОПКА */
        .fab { position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: black; box-shadow: 0 8px 25px rgba(0,255,163,0.4); z-index: 500; }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 999; backdrop-filter: blur(4px); }
    </style>
</head>
<body>

<div id="lock">
    <div class="logo" style="margin-bottom: 40px; font-size: 32px;">S.Hub</div>
    <input type="password" id="pass-field" class="pin-input" inputmode="numeric" maxlength="8" placeholder="••••">
    <button onclick="login()" class="btn-main" style="width: 220px">ВОЙТИ</button>
</div>

<div id="app">
    <header>
        <div class="logo">S.Hub</div>
        <div style="font-size: 12px; color: var(--dim);" id="status-mode">Secure Mode</div>
    </header>

    <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Поиск в базе..." oninput="render()">
    </div>

    <div id="list"></div>
</div>

<div class="fab" onclick="toggleAdd(true)">+</div>

<div class="overlay" id="overlay" onclick="toggleAdd(false)"></div>

<div id="form-add">
    <div style="display:flex; justify-content: space-between; margin-bottom: 15px;">
        <b style="font-size: 18px;">Новая запись</b>
        <span onclick="toggleAdd(false)" style="color: var(--dim);">Закрыть</span>
    </div>
    <input type="text" id="nt" placeholder="Заголовок">
    <textarea id="nd" rows="6" placeholder="Текст..." oninput="updateStats(this.value)"></textarea>
    <div style="font-size: 12px; color: var(--dim); margin-bottom: 15px;">Символов: <span id="char-count" style="color: var(--accent)">0</span></div>
    <button class="btn-main" onclick="saveNote()">СОХРАНИТЬ</button>
</div>

<script>
    const PASSWORD = "12051205";
    const PANIC_CODE = "0000"; 
    const PANIC_CODE = "1111":
    let database = JSON.parse(localStorage.getItem('sh_db_v11')) || [];
    let isPanic = false;

    function login() {
        const val = document.getElementById('pass-field').value;
        if(val === PASSWORD) {
            isPanic = false;
            showApp();
        } else if(val === PANIC_CODE) {
            isPanic = true;
            document.getElementById('status-mode').innerText = "Guest Mode";
            showApp();
        } else {
            document.getElementById('pass-field').style.borderColor = "red";
            setTimeout(() => document.getElementById('pass-field').style.borderColor = "#333", 500);
        }
    }

    function showApp() {
        document.getElementById('lock').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('lock').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            render();
        }, 400);
    }

    function toggleAdd(show) {
        document.getElementById('form-add').classList.toggle('active', show);
        document.getElementById('overlay').style.display = show ? 'block' : 'none';
    }

    function updateStats(val) { document.getElementById('char-count').innerText = val.length; }

    function saveNote() {
        const title = document.getElementById('nt').value;
        const text = document.getElementById('nd').value;
        if(!title || !text || isPanic) return;

        database.unshift({ title, text, id: Date.now() });
        localStorage.setItem('sh_db_v11', JSON.stringify(database));
        
        document.getElementById('nt').value = '';
        document.getElementById('nd').value = '';
        toggleAdd(false);
        render();
    }

    function render() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const listContainer = document.getElementById('list');
        const source = isPanic ? [] : database;
        
        listContainer.innerHTML = source
            .filter(n => n.title.toLowerCase().includes(query) || n.text.toLowerCase().includes(query))
            .map(n => `
                <div class="card">
                    <div class="card-h" onclick="toggleCard(${n.id})">
                        <div class="card-t">${n.title}</div>
                        <div class="card-arrow" id="a-${n.id}">▼</div>
                    </div>
                    <div class="card-d" id="d-${n.id}">${n.text}</div>
                    <div class="footer-card">
                        <span>${n.text.length} знаков</span>
                        <span class="del-btn" onclick="deleteNote(${n.id})">Удалить</span>
                    </div>
                </div>
            `).join('');
    }

    function toggleCard(id) {
        const el = document.getElementById('d-'+id);
        const arrow = document.getElementById('a-'+id);
        const isOpen = el.classList.toggle('open');
        arrow.style.transform = isOpen ? 'rotate(180deg)' : 'rotate(0deg)';
    }

    function deleteNote(id) {
        if(confirm("Удалить запись?")) {
            database = database.filter(n => n.id !== id);
            localStorage.setItem('sh_db_v11', JSON.stringify(database));
            render();
        }
    }
</script>
</body>
</html>
