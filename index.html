<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GitHub Banner Generator</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f4f9; padding: 20px; }
        canvas { border: 1px solid #ccc; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 100%; }
        .controls { margin-top: 20px; display: grid; gap: 10px; background: white; padding: 20px; border-radius: 8px; width: 400px; }
        input, select, button { padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        button { background: #238636; color: white; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background: #2ea043; }
    </style>
</head>
<body>

    <h2>🎨 Генератор обложек для GitHub</h2>
    
    <canvas id="bannerCanvas" width="1280" height="640"></canvas>

    <div class="controls">
        <input type="text" id="repoName" placeholder="Название проекта" value="My Useful Project">
        <input type="text" id="repoDesc" placeholder="Краткое описание" value="Крутой мессенджер на GitHub Pages">
        <label>Цвет фона:</label>
        <input type="color" id="bgColor" value="#0d1117">
        <label>Цвет текста:</label>
        <input type="color" id="textColor" value="#58a6ff">
        <button onclick="downloadBanner()">Скачать баннер (.png)</button>
    </div>

    <script>
        const canvas = document.getElementById('bannerCanvas');
        const ctx = canvas.getContext('2d');

        function draw() {
            const name = document.getElementById('repoName').value;
            const desc = document.getElementById('repoDesc').value;
            const bg = document.getElementById('bgColor').value;
            const textCol = document.getElementById('textColor').value;

            // Рисуем фон
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Настройка текста для заголовка
            ctx.fillStyle = textCol;
            ctx.font = "bold 80px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(name, canvas.width / 2, canvas.height / 2 - 20);

            // Настройка текста для описания
            ctx.fillStyle = "#8b949e"; // Серый подзаголовок
            ctx.font = "40px sans-serif";
            ctx.fillText(desc, canvas.width / 2, canvas.height / 2 + 60);

            // Рисуем декоративную полоску снизу
            ctx.fillStyle = textCol;
            ctx.fillRect(canvas.width/2 - 100, canvas.height/2 + 120, 200, 8);
        }

        // Обновляем при вводе
        document.querySelectorAll('input').forEach(el => el.addEventListener('input', draw));

        // Функция скачивания
        function downloadBanner() {
            const link = document.createElement('a');
            link.download = 'github-banner.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        // Первый запуск
        draw();
    </script>
</body>
</html>
