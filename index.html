<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Snake Mobile</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        canvas {
            border: 5px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background-color: #000;
            max-width: 90vw;
            max-height: 70vh;
        }
        .score {
            font-size: 24px;
            margin-bottom: 10px;
            color: #00ffcc;
        }
        .instructions {
            margin-top: 10px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="score">Счет: <span id="scoreVal">0</span></div>
    <canvas id="gameCanvas"></canvas>
    <div class="instructions">Свайпай, чтобы управлять змейкой</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");

        // Настройки сетки (адаптивно)
        const gridSize = 20;
        let tileCount; 
        
        let score = 0;
        let dx = 0;
        let dy = 0;
        
        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};

        // Подгонка размера холста
        function setupCanvas() {
            const size = Math.min(window.innerWidth * 0.9, 400);
            canvas.width = Math.floor(size / gridSize) * gridSize;
            canvas.height = canvas.width;
            tileCount = canvas.width / gridSize;
            resetGame();
        }

        function resetGame() {
            snake = [{x: 10, y: 10}];
            generateFood();
            dx = 0; dy = 0;
            score = 0;
            scoreElement.innerText = score;
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
        }

        // Основной цикл игры
        function draw() {
            updateSnake();
            
            if (checkGameOver()) {
                alert("Игра окончена! Ваш счет: " + score);
                resetGame();
            }

            clearCanvas();
            drawFood();
            drawSnake();
            
            setTimeout(draw, 100); // Скорость игры (100мс = 10 кадров в сек)
        }

        function clearCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            ctx.fillStyle = "#00ffcc";
            snake.forEach((part, index) => {
                // Голова чуть ярче
                if (index === 0) ctx.fillStyle = "#ffffff";
                else ctx.fillStyle = "#00ffcc";
                
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        function drawFood() {
            ctx.fillStyle = "#ff4444";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        function updateSnake() {
            if (dx === 0 && dy === 0) return; // Ждем начала движения

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreElement.innerText = score;
                if (navigator.vibrate) navigator.vibrate(30); // Вибро при поедании
                generateFood();
            } else {
                snake.pop();
            }
        }

        function checkGameOver() {
            const head = snake[0];
            // Стены
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) return true;
            // Самопересечение
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) return true;
            }
            return false;
        }

        // --- Управление Свайпами ---
        let touchStartX = 0;
        let touchStartY = 0;

        window.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, false);

        window.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;
            handleSwipe(touchEndX, touchEndY);
        }, false);

        function handleSwipe(endX, endY) {
            const diffX = endX - touchStartX;
            const diffY = endY - touchStartY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                // Горизонтальный свайп
                if (diffX > 0 && dx === 0) { dx = 1; dy = 0; }
                else if (diffX < 0 && dx === 0) { dx = -1; dy = 0; }
            } else {
                // Вертикальный свайп
                if (diffY > 0 && dy === 0) { dx = 0; dy = 1; }
                else if (diffY < 0 && dy === 0) { dx = 0; dy = -1; }
            }
        }

        // Управление клавиатурой (для ПК)
        window.addEventListener("keydown", e => {
            if (e.key === "ArrowUp" && dy === 0) { dx = 0; dy = -1; }
            if (e.key === "ArrowDown" && dy === 0) { dx = 0; dy = 1; }
            if (e.key === "ArrowLeft" && dx === 0) { dx = -1; dy = 0; }
            if (e.key === "ArrowRight" && dx === 0) { dx = 1; dy = 0; }
        });

        setupCanvas();
        draw();
    </script>
</body>
</html>
